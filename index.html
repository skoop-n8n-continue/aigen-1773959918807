<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Market Square Birmingham Menu</title>

    <!-- Google Fonts for Market Fresh branding -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css?v=m1k2f3">
</head>
<body>
    <div id="app-container">
        <header id="app-header">
            <div class="header-content">
                <img id="store-logo" src="" alt="Store Logo">
                <h1 id="store-name"></h1>
            </div>
        </header>

        <main id="main-content">
            <div id="menu-grid" class="menu-grid">
                <!-- Categories and Products will be injected here via JS -->
            </div>
        </main>

        <footer id="ticker-footer">
            <div class="ticker-wrap">
                <div class="ticker">
                    <div class="ticker__item" id="announcement-text"></div>
                    <!-- Duplicate for smooth infinite scroll -->
                    <div class="ticker__item" id="announcement-text-dup"></div>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js?v=m1k2f3"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
